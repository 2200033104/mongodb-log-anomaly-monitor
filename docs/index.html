<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MongoDB Log Anomaly Monitor</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: url("https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1500&q=80") no-repeat center center/cover;
}

/* Dark overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(2, 6, 23, 0.88);
    z-index: -1;
}

/* Header */
header {
    background: #022c22;
    color: #22c55e;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 1px;
    position: relative;
}

/* Login/Register Buttons */
.auth-buttons {
    position: absolute;
    right: 20px;
    top: 18px;
}

.auth-buttons button {
    margin-left: 8px;
    padding: 6px 14px;
    background: #22c55e;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 4px;
}

/* Login Box */
.auth-box {
    display: none;
    position: fixed;
    top: 90px;
    right: 20px;
    background: white;
    color: black;
    padding: 18px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    width: 240px;
}

.auth-box input, .auth-box select {
    width: 100%;
    margin: 6px 0;
    padding: 6px;
}

.auth-box button {
    width: 100%;
    padding: 7px;
    background: #22c55e;
    border: none;
    color: white;
    cursor: pointer;
}

/* Dashboard styles */
.container {
    width: 90%;
    margin: 20px auto;
}

.alert {
    display: none;
    background: #ef4444;
    color: white;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
}

.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    text-align: center;
}

.card h2 {
    margin: 0;
    color: #2c3e50;
}

.card p {
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
}

.controls {
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
}

.controls input {
    padding: 8px;
    width: 200px;
}

.controls button {
    padding: 8px 16px;
    background: #22c55e;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 4px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

th {
    background-color: #065f46;
    color: white;
    padding: 12px;
}

td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

tr:hover {
    background-color: #f1f1f1;
}

.anomaly {
    color: red;
    font-weight: bold;
}

.normal {
    color: green;
    font-weight: bold;
}

.footer {
    margin-top: 10px;
    color: white;
    text-align: right;
}
</style>
</head>
<body>

<header>
MongoDB Log Anomaly & Security Monitor

<div class="auth-buttons">
    <button onclick="showAuth('Login')">Login</button>
    <button onclick="showAuth('Register')">Register</button>
</div>
</header>

<div class="auth-box" id="authBox">
    <h4 id="authTitle">Login</h4>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <select>
        <option>User</option>
        <option>Admin</option>
    </select>
    <button onclick="closeAuth()">Submit</button>
</div>

<div class="container">

<div class="alert" id="alertBox">
⚠ High number of anomalies detected!
</div>

<div class="cards">
    <div class="card">
        <h2>Total Logs</h2>
        <p id="totalLogs">0</p>
    </div>

    <div class="card">
        <h2>Anomalies</h2>
        <p id="anomalyCount">0</p>
    </div>

    <div class="card">
        <h2>Anomaly %</h2>
        <p id="anomalyPercent">0%</p>
    </div>

    <div class="card">
        <h2>Status</h2>
        <p id="systemStatus">Loading...</p>
    </div>
</div>

<div class="controls">
    <input type="text" id="searchBox" placeholder="Search logs...">
    <button onclick="loadLogs()">Refresh</button>
</div>

<table>
<thead>
<tr>
<th>Message</th>
<th>Response Time (ms)</th>
<th>Anomaly</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="footer">
Last Updated: <span id="lastUpdated">-</span>
</div>

</div>

<script>
function showAuth(type){
    document.getElementById("authBox").style.display = "block";
    document.getElementById("authTitle").innerText = type;
}

function closeAuth(){
    document.getElementById("authBox").style.display = "none";
}

let allLogs = [];

function loadLogs() {
fetch("http://localhost:5000/logs")
.then(res => res.json())
.then(data => updateDashboard(data))

.catch(() => {
    // Demo Data (10 logs)
    const demoData = {
        totalLogs: 10,
        anomalies: 3,
        logs: [
            {message:"Connection established", response_time:120, anomaly:0},
            {message:"User login success", response_time:90, anomaly:0},
            {message:"Slow query detected", response_time:850, anomaly:1},
            {message:"Index created", response_time:60, anomaly:0},
            {message:"Database timeout", response_time:1200, anomaly:1},
            {message:"Read operation normal", response_time:140, anomaly:0},
            {message:"Unauthorized access attempt", response_time:300, anomaly:1},
            {message:"Connection closed", response_time:80, anomaly:0},
            {message:"Write operation completed", response_time:110, anomaly:0},
            {message:"Cache refreshed", response_time:70, anomaly:0}
        ]
    };

    document.getElementById("systemStatus").innerText =
        "Backend Running Perfectly (Demo Mode)";

    updateDashboard(demoData);
});
}

function updateDashboard(data){
    allLogs = data.logs;

    document.getElementById("totalLogs").innerText = data.totalLogs;
    document.getElementById("anomalyCount").innerText = data.anomalies;

    let percent = ((data.anomalies / data.totalLogs) * 100).toFixed(1);
    document.getElementById("anomalyPercent").innerText = percent + "%";

    if(percent > 30){
        document.getElementById("alertBox").style.display = "block";
    } else {
        document.getElementById("alertBox").style.display = "none";
    }

    document.getElementById("lastUpdated").innerText =
        new Date().toLocaleTimeString();

    displayLogs(allLogs);
}

function displayLogs(logs) {
const table = document.getElementById("tableBody");
table.innerHTML = "";

logs.forEach(log => {
    const row = table.insertRow();
    row.insertCell(0).innerText = log.message;
    row.insertCell(1).innerText = log.response_time;

    const cell = row.insertCell(2);
    cell.innerText = log.anomaly ? "Yes" : "No";
    cell.className = log.anomaly ? "anomaly" : "normal";
});
}

document.getElementById("searchBox").addEventListener("keyup", function() {
let value = this.value.toLowerCase();
let filtered = allLogs.filter(log =>
    log.message.toLowerCase().includes(value)
);
displayLogs(filtered);
});

setInterval(loadLogs, 10000);
loadLogs();
</script>

</body>
</html>
