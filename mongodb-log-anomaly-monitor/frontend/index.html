<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MongoDB Log Anomaly Monitor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: 20px auto;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h2 {
            margin: 0;
            color: #2c3e50;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        th {
            background-color: #34495e;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .anomaly {
            color: red;
            font-weight: bold;
        }

        .normal {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>MongoDB Log Anomaly & Security Dashboard</h1>
</header>

<div class="container">

    <!-- Summary Cards -->
    <div class="cards">
        <div class="card">
            <h2>Total Logs</h2>
            <p id="totalLogs">0</p>
        </div>

        <div class="card">
            <h2>Anomalies</h2>
            <p id="anomalyCount">0</p>
        </div>

        <div class="card">
            <h2>Status</h2>
            <p id="systemStatus">Loading...</p>
        </div>
    </div>

    <!-- Logs Table -->
    <table>
        <thead>
            <tr>
                <th>Message</th>
                <th>Response Time (ms)</th>
                <th>Anomaly</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>
fetch("http://localhost:5000/logs")
.then(res => res.json())
.then(data => {

    // Update summary
    document.getElementById("totalLogs").innerText = data.totalLogs;
    document.getElementById("anomalyCount").innerText = data.anomalies;

    document.getElementById("systemStatus").innerText =
        data.anomalies > 0 ? "Attention Needed" : "Healthy";

    // Fill table
    const table = document.getElementById("tableBody");

    data.logs.forEach(log => {
        const row = table.insertRow();

        row.insertCell(0).innerText = log.message;
        row.insertCell(1).innerText = log.response_time;

        const anomalyCell = row.insertCell(2);
        anomalyCell.innerText = log.anomaly ? "Yes" : "No";
        anomalyCell.className = log.anomaly ? "anomaly" : "normal";
    });

})
.catch(err => {
    document.getElementById("systemStatus").innerText = "Backend not running";
    console.error(err);
});
</script>

</body>
</html>
